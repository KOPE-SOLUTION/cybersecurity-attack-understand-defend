services:
  trusted-site:
    build:
      context: .
      dockerfile: Containerfile
      args:
        SITE_DIR: trusted-site
    image: localhost/kope-ep01-1-trusted:lab
    ports:
      - "127.0.0.1:8100:80"
    restart: unless-stopped

  external-site:
    build:
      context: .
      dockerfile: Containerfile
      args:
        SITE_DIR: external-site
    image: localhost/kope-ep01-1-external:lab
    ports:
      - "127.0.0.1:9100:80"
    restart: unless-stopped
